<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="newtask.css">
    <link rel="icon" type="image/x-icon" href="Images/favicon.ico">
    <title>Create a task</title>
</head>
<body>
    <div class="header">
        <h1 class="header_title">PACE</h1>
    </div>

    <h1 class="body_title">Create A Task</h1>
    <p class="body_inputTitle">What are you focusing on?</p>

    <div class="task_details">
        <input placeholder="Name of the task" class="task_name">
        <br>
        <div class="selectors">
               <input type="radio" name="category" id="work" value="work" checked>
               <label for="work" class="selector_label">Work</label>
               
               <input type="radio" name="category" id="life" value="life">
               <label for="life" class="selector_label">Life</label>

               <div class="slider"></div>
        </div>

        <br>
        <span style="text-align: left; font-family: Syne; color: #474747;">Date</span>
        <input type="date" class="due_date" placeholder="Due Date">
        <br>
        <span style="text-align: left; font-family: Syne; color: #474747;">Time</span>
        <input type="time" class="time" placeholder="Time">
    </div>
    
    <a href="taskpage.html"><button class="task_submit">Create Task</button></a>

<div class="footer">
        <a href="index.html"><img src="Images/Home Inactive.png" class="footer_home"></a>
        <a href="newtask.html"><img src="Images/Add Active.png" class="footer_add"></a>
        <a href="taskpage.html"><img src="Images/List Inactive.png"></a>
        <a href="settings.html"><img src="Images/Settings Inactive.png" class="footer_settings"></a>
</div>

<script>
    const inputs = document.querySelectorAll('.selectors input');
    const slider = document.querySelector('.slider');
    inputs.forEach(input => {
        input.addEventListener('change', () => {
            slider.style.transform = input.value === 'life'
                ? 'translateX(calc(100% + 10px))'
                : 'translateX(0)';
        });
    });
</script>

</body>
